# verl: merge *only* reward + data paths into an official example from your verl version.
# Project-wide settings: use configs/pipeline.example.yaml (or pipeline.lfw / pipeline.wider), then add these keys to the verl
# `examples/.../config.yaml` (pin verl to a recipe git SHA; see verl `REQUIRED_VERL.txt` if any).
# Docs: https://verl.readthedocs.io/en/latest/preparation/reward_function.html
#         https://github.com/verl-project/verl

custom_reward_function:
  path: rewards/face_attr_reward.py
  name: compute_score

data:
  train_files: data/verl/train.parquet
  val_files: data/verl/val.parquet
  # test_files: data/verl/test.parquet

# Set policy model in the verl config you copy from, e.g.:
#   actor_rollout_ref.model.path: <hf_model_id from pipeline.yaml>
# Optional: FSDP2, vLLM rollout, etc. — use your verl version’s example, not a fork here.
