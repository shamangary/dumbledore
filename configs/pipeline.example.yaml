# Default pipeline template (LFW-oriented, minimal).
# Copy to `configs/pipeline.yaml` (e.g. `./scripts/run_stage0_config.sh`).
#
# Fuller examples:
#   - pipeline.lfw.example.yaml  — LFW + long custom prompt text
#   - pipeline.wider.example.yaml — WIDER FACE subset + prompt tuned for full-scene bboxes (CC BY-NC-ND 4.0)

hf_model_id: google/gemma-4-E2B-it

deepface:
  model_name: Facenet512
  detector_backend: opencv
  include_facenet512: true
  max_faces: 5
  ground_truth:
    # LFW crops: prefer attributes over boxes (use `pipeline.wider.example.yaml` for bbox in GT)
    bbox: false
    age: true
    gender: true
    emotion: true
    race: true
    is_real: false

data:
  num_images: 100
  train_ratio: 0.8
  val_ratio: 0.1
  seed: 42
  raw_dir: data/raw_images
  jsonl: data/gt.jsonl
  parquet_dir: data/verl

dataset:
  name: lfw
  config_name: null
  split: train
  image_column: image
  # hf_id: CUHK-CSE/wider_face   # only when dataset.name is wider_face

# `null` = auto user lists **only** fields enabled in `deepface.ground_truth` (must stay in sync if you edit one side).
# `null` = built-in system + auto user (includes a one-line LFW note when `dataset.name` is lfw)
prompt:
  system_instruction: null
  user: null
  # by_dataset: { lfw: { system_instruction: null, user: null }, wider_face: { system_instruction: ..., user: ... } }

verl:
  method: grpo
  example_config: null
  verl_root: null
